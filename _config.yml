theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: Jason
tagline: 일상을 기록하는 블로그
description: >-
  Backend Engineer Jason의 일상과 생각을 기록하는 블로그.

url: "https://iamkanguk97.github.io"
baseurl: ""

github:
  username: iamkanguk97

twitter:
  username:

social:
  name: Jason
  email: iamkanguk97@kakao.com
  fediverse_handle:
  links:
    - https://github.com/iamkanguk97
    - https://www.linkedin.com/in/iamkanguk/

profile:
  role: Backend Engineer

visitor_counter:
  enabled: true
  provider: countapi
  namespace: iamkanguk97-github-io
  timezone: Asia/Seoul

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

cdn:

avatar: /assets/images/profile-avatar.svg

social_preview_image:

toc: true

comments:
  provider: giscus
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo: iamkanguk97/iamkanguk97.github.io
    repo_id: R_kgDOR8LqFA
    category: General
    category_id: DIC_kwDOR8LqFM4C6UMH
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en
    reactions_enabled: 1

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      # - "/example"

paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-include-cache

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
